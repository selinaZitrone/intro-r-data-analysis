project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!*.Rmd"
    - "!additional_docs/"
    - "!R/byod/"
    - "!R/quarto_example.qmd"
  resources:
    - "sessions/slides_pdf/*.pdf"
    - "R/Tasks/"
    - "data/read_challenge/*"
    - "R/byod/general_tips/*"
    - "R/byod/solutions_for_my_datasets/*.R"
    - "timer_solution.js"

website:
  page-navigation: true
  repo-url: "https://github.com/selinaZitrone/intro-r-data-analysis"
  site-url: "https://selinazitrone.github.io/intro-r-data-analysis/"
  repo-actions: [edit, issue]
  repo-branch: master
  page-footer: "Copyright 2026, Selina Baldauf"
  title: ""
  navbar:
    background: primary
    left:
      - text: "<b>Home</b>"
        href: index.qmd
      - text: "Preparations"
        href: preparations.qmd
      - text: "Resources"
        href: online_resources.qmd
      - text: "Packages"
        href: packages.qmd

    right:
      - icon: github
        menu:
          - text: Source Code
            url: https://github.com/selinaZitrone/intro-r-data-analysis
          - text: Report an Issue
            url: https://github.com/selinaZitrone/intro-r-data-analysis/issues/new

format:
  html:
    theme:
      light: [flatly, theme.scss]
      dark: [darkly, theme.scss]
    toc: true
    number-sections: false
    code-copy: true
    code-overflow: wrap
    code-line-numbers: false
    highlight-style: arrow

editor: source

execute:
  cache: true
  error: true
  freeze: auto

